<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1400" viewBox="0 0 1400 1400" role="img" aria-label="Colored epee mask size and care guide"><style>text{font-family:Arial,Helvetica,sans-serif}.serif{font-family:Georgia,'Times New Roman',serif}.eyebrow{font-size:20px;font-weight:800;letter-spacing:3px;fill:#c92337}.body{font-size:28px;fill:#46515c}.small{font-size:24px;fill:#61707f}.label{font-size:28px;font-weight:800;fill:#101820}.caption{font-size:22px;fill:#61707f}.white{fill:#fff}.dark{fill:#101820}</style><rect width="1400" height="1400" fill="#ffffff"/><text x="70" y="88" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="8" fill="#101820">BLADECRAFT</text><text x="70" y="205" class="eyebrow">FIT &amp; CARE</text><text x="70" y="282" class="serif dark" font-size="76" font-weight="600">Mask sizing and daily care.</text><text x="70" y="340" class="body">A secure fit protects better and feels more stable during bouts.</text><g transform="translate(70 420)"><rect width="1260" height="520" fill="#f7f8fa"/><text x="50" y="80" class="label">Available sizes</text><g transform="translate(50 130)"><rect width="150" height="54" fill="#fff" stroke="#d9e0e7"/><text x="75" y="36" text-anchor="middle" class="label" font-size="24">XS</text><text x="190" y="36" class="body" font-size="26">Youth / smaller head</text></g><g transform="translate(50 206)"><rect width="150" height="54" fill="#fff" stroke="#d9e0e7"/><text x="75" y="36" text-anchor="middle" class="label" font-size="24">0 / S</text><text x="190" y="36" class="body" font-size="26">Small adult</text></g><g transform="translate(50 282)"><rect width="150" height="54" fill="#fff" stroke="#d9e0e7"/><text x="75" y="36" text-anchor="middle" class="label" font-size="24">1 / M</text><text x="190" y="36" class="body" font-size="26">Medium adult</text></g><g transform="translate(50 358)"><rect width="150" height="54" fill="#fff" stroke="#d9e0e7"/><text x="75" y="36" text-anchor="middle" class="label" font-size="24">2 / L</text><text x="190" y="36" class="body" font-size="26">Large adult</text></g><g transform="translate(50 434)"><rect width="150" height="54" fill="#fff" stroke="#d9e0e7"/><text x="75" y="36" text-anchor="middle" class="label" font-size="24">3 / XL</text><text x="190" y="36" class="body" font-size="26">Extra large</text></g><text x="710" y="80" class="label">Care notes</text><g transform="translate(710 140)"><circle cx="12" cy="12" r="7" fill="#c92337"/><text x="40" y="22" class="body" font-size="26">Remove liner to air dry.</text></g><g transform="translate(710 218)"><circle cx="12" cy="12" r="7" fill="#c92337"/><text x="40" y="22" class="body" font-size="26">Keep colored mesh dry after use.</text></g><g transform="translate(710 296)"><circle cx="12" cy="12" r="7" fill="#c92337"/><text x="40" y="22" class="body" font-size="26">Inspect bib, strap, and shell.</text></g><g transform="translate(710 374)"><circle cx="12" cy="12" r="7" fill="#c92337"/><text x="40" y="22" class="body" font-size="26">Confirm epee compatibility.</text></g></g><g transform="translate(70 1010)"><rect width="1260" height="210" fill="#101820"/><text x="44" y="66" class="white" font-size="30" font-weight="800">Before you order</text><text x="44" y="116" class="white" opacity="0.82" font-size="28">The mask should feel secure without painful pressure points.</text><text x="44" y="160" class="white" opacity="0.82" font-size="28">When between sizes, ask a coach or club armorer to check fit.</text></g><text x="70" y="1315" class="small">Certification and fit requirements may vary by competition organizer.</text></svg>